    /* ── Base ── */
    body {
      background: var(--t-surface);
      color: var(--t-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .pp-header {
      background: linear-gradient(135deg, var(--t-accent-1) 0%, var(--t-accent-2) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 11px;
      flex-shrink: 0;
    }
    .pp-brand { display: flex; align-items: center; gap: 9px; }
    .pp-logo {
      display: inline-flex; align-items: center;
      width: 22px; height: 22px; color: var(--t-on-accent);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-3px) rotate(3deg)} }
    .pp-brand-name { font-size: 15px; font-weight: 800; color: var(--t-on-accent); letter-spacing: -0.02em; }
    .pp-brand-sub  { font-size: 10.5px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .pp-settings-btn {
      background: rgba(255,255,255,0.18); border: none; border-radius: 8px;
      color: var(--t-on-accent); cursor: pointer; font-size: 13px;
      font-family: inherit; padding: 5px 11px; opacity: 0.85;
      transition: background 0.12s, opacity 0.12s;
    }
    .pp-settings-btn:hover { background: rgba(255,255,255,0.3); opacity: 1; }

    /* ── Banners ── */
    #pp-no-key {
      display: none; flex-shrink: 0;
      background: var(--t-subtle); border-bottom: 1px solid var(--t-ring);
      border: none; color: var(--t-ai-label); cursor: pointer;
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 8px 20px; text-align: center; width: 100%;
      transition: background 0.12s;
    }
    #pp-no-key:hover { background: var(--t-ring); }
    #pp-selection-notice {
      display: none; flex-shrink: 0;
      background: var(--t-subtle); border-bottom: 1px solid var(--t-panel-border);
      color: var(--t-ai-label); font-size: 11.5px; font-weight: 500;
      padding: 6px 20px; align-items: center; gap: 6px;
    }

    /* ── Chat history ── */
    #chat-history {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }
    #chat-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--t-you-label);
      opacity: 0.35;
      user-select: none;
      text-align: center;
      pointer-events: none;
      padding-bottom: 40px;
    }
    #chat-placeholder svg { width: 36px; height: 36px; }
    #chat-placeholder h3  { font-size: 15px; font-weight: 600; }
    #chat-placeholder p   { font-size: 12.5px; }

    /* ── Chat turns (iMessage-style left/right alignment) ── */
    .chat-turn {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* You → right side */
    .chat-turn-you { align-items: flex-start; }
    /* AI  → right side */
    .chat-turn-ai  { align-items: flex-end; }

    /* Content wrapper — max 50% width, grows to fit text */
    .chat-turn-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 50%;
      min-width: 120px;
    }

    .chat-bubble-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--t-you-label);
    }
    /* AI header row: label left, copy button right */
    .chat-ai-header {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .chat-ai-label { color: var(--t-ai-label); }

    .chat-bubble {
      border-radius: 14px; font-size: 13.5px; line-height: 1.72;
      padding: 12px 16px; white-space: pre-wrap; word-break: break-word;
    }
    /* You bubble — right-biased corners */
    .chat-you-bubble {
      background: var(--t-you-bg); border: 1.5px solid var(--t-chip-border);
      color: var(--t-you-fg);
      border-radius: 4px 14px 14px 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    /* AI bubble — left-biased corners */
    .chat-ai-bubble {
      background: linear-gradient(135deg, var(--t-accent-1) 0%, var(--t-accent-2) 100%);
      color: var(--t-on-accent);
      border-radius: 14px 4px 14px 14px;
      box-shadow: 0 4px 20px var(--t-glow);
    }
    .chat-ai-loading { display: flex; align-items: center; padding: 12px 16px; }
    .chat-error-bubble {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 12px; color: #dc2626; font-size: 13px;
    }
    .pp-dots { display: flex; align-items: center; gap: 5px; }
    .pp-dot {
      width: 7px; height: 7px; background: rgba(255,255,255,0.85);
      border-radius: 50%; animation: bounce 1.1s ease-in-out infinite;
    }
    .pp-dot:nth-child(2){animation-delay:.18s}
    .pp-dot:nth-child(3){animation-delay:.36s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

    .chat-copy-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--t-subtle); border: 1.5px solid var(--t-ring);
      border-radius: 20px; color: var(--t-ai-label); cursor: pointer;
      font-family: inherit; font-size: 10.5px; font-weight: 600;
      padding: 2px 9px; flex-shrink: 0; transition: all 0.12s; white-space: nowrap;
    }
    .chat-copy-btn:hover { background: var(--t-ring); border-color: var(--t-accent-1); }

    /* ── Controls panel ── */
    .pp-controls {
      flex-shrink: 0;
      border-top: 1px solid var(--t-panel-border);
      background: var(--t-panel-bg);
      display: flex;
      flex-direction: column;
    }

    /* Compact summary rows */
    .pp-compact-row {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 16px 5px; flex-wrap: wrap;
    }
    .pp-compact-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--t-you-label); flex-shrink: 0;
    }
    .pp-compact-sep   { color: var(--t-you-label); opacity: 0.4; font-size: 11px; flex-shrink: 0; }
    .pp-compact-value {
      color: var(--t-ai-label); font-size: 11.5px; font-weight: 600;
      flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pp-compact-more {
      background: var(--t-subtle); border: 1px solid var(--t-ring);
      border-radius: 100px; color: var(--t-ai-label); cursor: pointer;
      font-family: inherit; font-size: 10.5px; font-weight: 600;
      padding: 2px 9px; flex-shrink: 0; transition: background 0.12s; white-space: nowrap;
    }
    .pp-compact-more:hover { background: var(--t-ring); }

    /* Chip grids */
    .pp-tones {
      display: flex; flex-wrap: wrap; gap: 5px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 16px;
    }
    .pp-tones.open { max-height: 220px; padding: 3px 16px 8px; }
    .pp-chip, .pp-lang-chip {
      background: var(--t-you-bg); border: 1.5px solid var(--t-chip-border);
      border-radius: 100px; color: var(--t-you-label); cursor: pointer;
      font-family: inherit; font-size: 11px; font-weight: 500;
      padding: 3px 10px; transition: all 0.12s; white-space: nowrap;
    }
    .pp-chip:hover, .pp-lang-chip:hover { border-color: var(--t-accent-1); color: var(--t-ai-label); }
    .pp-chip.active, .pp-lang-chip.active {
      background: linear-gradient(135deg, var(--t-accent-1), var(--t-accent-2));
      border-color: transparent; color: var(--t-on-accent);
      font-weight: 600; box-shadow: 0 2px 8px var(--t-glow);
    }

    .pp-row-divider { height: 1px; background: var(--t-panel-border); flex-shrink: 0; }

    /* ── Input section ── */
    .pp-input-section { padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 8px; }
    #pp-input {
      width: 100%;
      background: var(--t-you-bg); border: 1.5px solid var(--t-chip-border);
      border-radius: 12px; color: var(--t-you-fg);
      font-family: inherit; font-size: 13px; line-height: 1.6;
      min-height: 70px; max-height: 180px;
      outline: none; padding: 9px 12px;
      resize: vertical; transition: border-color 0.15s;
    }
    #pp-input:focus { border-color: var(--t-accent-1); }
    #pp-input::placeholder { color: var(--t-you-label); opacity: 0.6; }

    /* Clear button — pill inside textarea, top-right corner */
    .pp-textarea-wrap { position: relative; }
    #pp-input { padding-right: 44px; }
    #pp-clear-btn {
      position: absolute; top: 8px; right: 8px;
      background: var(--t-subtle); border: 1px solid var(--t-ring);
      border-radius: 100px; color: var(--t-ai-label); cursor: pointer;
      font-family: inherit; font-size: 11px; font-weight: 600;
      padding: 1px 7px; transition: background 0.12s; white-space: nowrap;
      z-index: 1; line-height: 1.6;
    }
    #pp-clear-btn:hover { background: var(--t-ring); }

    /* Action bar: run button */
    .pp-action-bar { display: flex; gap: 8px; align-items: center; }

    .pp-btn-run {
      flex: 1;
      background: linear-gradient(135deg, var(--t-accent-1), var(--t-accent-2));
      border: none; border-radius: 10px;
      color: var(--t-on-accent); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      padding: 10px 14px; box-shadow: 0 3px 12px var(--t-glow);
      transition: filter 0.12s, transform 0.1s;
    }
    .pp-btn-run:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
    .pp-btn-run:active { transform: translateY(0); }
    .pp-btn-run:disabled { opacity: 0.6; cursor: not-allowed; }
    .pp-spin {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <!-- Header -->
  <div class="pp-header">
    <div class="pp-brand">
      <span class="pp-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </span>
      <div>
        <div class="pp-brand-name">PenPal AI</div>
        <div class="pp-brand-sub">Full browser tab</div>
      </div>
    </div>
    <button class="pp-settings-btn" id="pp-settings-btn">&#9881; Settings</button>
  </div>

  <!-- No-key banner -->
  <button id="pp-no-key">&#128273; No API key set &mdash; click to open Settings</button>

  <!-- Selection-loaded notice -->
  <div id="pp-selection-notice">&#10022; Page text detected &mdash; loaded in the input below</div>

  <!-- Scrollable chat history -->
  <div id="chat-history">
    <div id="chat-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
      <h3>Your rewrite will appear here</h3>
      <p>Type or paste text below, choose a tone, then click Rewrite.</p>
    </div>
  </div>

  <!-- Controls panel -->
  <div class="pp-controls">

    <!-- Tone -->
    <div id="pp-tone-row">
      <div class="pp-compact-row">
        <span class="pp-compact-label">Tone</span>
        <span class="pp-compact-sep">&mdash;</span>
        <span class="pp-compact-value" id="pp-tone-value">&#128522; Casual</span>
        <button class="pp-compact-more" id="pp-tone-more-btn">+ More</button>
      </div>
      <div class="pp-tones" id="pp-tones-wrap"></div>
    </div>

    <div class="pp-row-divider" id="pp-lang-divider"></div>

    <!-- Language -->
    <div id="pp-lang-row">
      <div class="pp-compact-row">
        <span class="pp-compact-label">Language</span>
        <span class="pp-compact-sep">&mdash;</span>
        <span class="pp-compact-value" id="pp-lang-value">&#127482;&#127480; English (US)</span>
        <button class="pp-compact-more" id="pp-lang-more-btn">+ More</button>
      </div>
      <div class="pp-tones" id="pp-langs-wrap"></div>
    </div>

    <div class="pp-row-divider"></div>

    <!-- Input + action bar -->
    <div class="pp-input-section">
      <div class="pp-textarea-wrap">
        <textarea id="pp-input"
          placeholder="Paste or type text to improve… (Shift+Enter for new line, Enter to rewrite)"></textarea>
        <button id="pp-clear-btn">&times;</button>
      </div>
      <div class="pp-action-bar">
        <button class="pp-btn-run" id="pp-run-btn">
          <span id="pp-run-label">&#10022; Rewrite with PenPal AI</span>
          <div class="pp-spin" id="pp-spin" style="display:none"></div>
        </button>
      </div>
    </div>

  </div><!-- /pp-controls -->

  <script src="penpal-tab.js"></script>
</body>
</html>
