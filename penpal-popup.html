    /* ── Default Theme Variables ── */
    body {
      --t-accent-1:     #6d28d9;
      --t-accent-2:     #4f46e5;
      --t-on-accent:    #ffffff;
      --t-glow:         rgba(109,40,217,0.35);
      --t-subtle:       rgba(109,40,217,0.10);
      --t-ring:         rgba(109,40,217,0.30);
      --t-surface:      #f0edf8;
      --t-text:         #1a1226;
      --t-panel-bg:     rgba(255,255,255,0.55);
      --t-panel-border: rgba(109,40,217,0.10);
      --t-chip-border:  #e5e7eb;
      --t-you-bg:       #ffffff;
      --t-you-fg:       #374151;
      --t-you-label:    #6b7280;
      --t-ai-label:     #7c3aed;

      width: 400px;
      background: var(--t-surface);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: var(--t-text);
      display: flex;
      flex-direction: column;
      min-height: 100px;
    }

    /* Standalone pop-out window — fill the whole browser window instead of
       the fixed popup size */
    body.pp-standalone {
      width: 100%;
      min-width: 360px;
      height: 100vh;
      min-height: 100vh;
    }
    body.pp-standalone .pp-chat { flex: 1; }

    /* ── Header ── */
    .pp-header {
      background: linear-gradient(135deg, var(--t-accent-1) 0%, var(--t-accent-2) 100%);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .pp-brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .pp-logo {
      display: inline-flex;
      align-items: center;
      width: 22px; height: 22px;
      color: var(--t-on-accent);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-3px) rotate(3deg); }
    }
    .pp-brand-name  { font-size: 15px; font-weight: 800; color: var(--t-on-accent); letter-spacing: -0.02em; }
    .pp-brand-tag   { font-size: 10.5px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .pp-header-actions { display: flex; align-items: center; gap: 6px; }
    .pp-settings-btn,
    .pp-popout-btn {
      background: rgba(255,255,255,0.18);
      border: none; border-radius: 8px;
      color: var(--t-on-accent);
      opacity: 0.85;
      cursor: pointer; font-size: 13px;
      padding: 5px 10px;
      transition: background 0.12s, opacity 0.12s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .pp-settings-btn:hover,
    .pp-popout-btn:hover { background: rgba(255,255,255,0.3); opacity: 1; }
    .pp-popout-btn { padding: 5px 7px; }

    /* ── No-key banner ── */
    #pp-no-key {
      display: none;
      background: var(--t-subtle);
      border-bottom: 1px solid var(--t-ring);
      color: var(--t-ai-label);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      text-align: center;
      transition: background 0.12s;
    }
    #pp-no-key:hover { background: var(--t-ring); }

    /* ── Page selection notice ── */
    #pp-selection-notice {
      display: none;
      background: var(--t-subtle);
      border-bottom: 1px solid var(--t-panel-border);
      color: var(--t-ai-label);
      font-size: 11.5px;
      font-weight: 500;
      padding: 7px 16px;
      align-items: center;
      gap: 6px;
    }
    #pp-selection-notice.visible { display: flex; }

    /* ── Chat area ── */
    .pp-chat {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px 14px 10px;
      flex: 1;
    }

    /* Input area */
    .pp-bubble-wrap { display: flex; flex-direction: column; gap: 5px; }
    .pp-bubble-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0 4px;
    }
    .pp-bubble-you .pp-bubble-label { color: var(--t-you-label); }

    .pp-bubble-you .pp-textarea {
      width: 100%;
      background: var(--t-you-bg);
      border: 1.5px solid var(--t-chip-border);
      border-radius: 16px 16px 16px 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      color: var(--t-you-fg);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.65;
      min-height: 80px;
      max-height: 160px;
      outline: none;
      padding: 11px 14px;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .pp-bubble-you .pp-textarea:focus { border-color: var(--t-accent-1); }
    .pp-textarea::placeholder { color: var(--t-you-label); opacity: 0.6; }

    /* AI result bubble */
    .pp-bubble-ai { align-items: flex-end; }
    .pp-result-bubble {
      background: linear-gradient(135deg, var(--t-accent-1) 0%, var(--t-accent-2) 100%);
      border-radius: 16px 16px 4px 16px;
      box-shadow: 0 4px 16px var(--t-glow);
      color: var(--t-on-accent);
      font-size: 13px;
      line-height: 1.68;
      max-width: 100%;
      padding: 12px 15px;
      white-space: pre-wrap;
      word-break: break-word;
      width: 100%;
    }

    /* Loading dots */
    .pp-dots {
      background: linear-gradient(135deg, var(--t-accent-1) 0%, var(--t-accent-2) 100%);
      border-radius: 16px 16px 4px 16px;
      box-shadow: 0 4px 16px var(--t-glow);
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      align-self: flex-end;
    }
    .pp-dot {
      width: 7px; height: 7px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      animation: bounce 1.1s ease-in-out infinite;
    }
    .pp-dot:nth-child(2) { animation-delay: 0.18s; }
    .pp-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%         { transform: translateY(-6px); }
    }

    /* Error */
    .pp-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      color: #dc2626;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px 12px;
    }

    /* ── Tone + Language section ── */
    .pp-tone-section {
      background: var(--t-panel-bg);
      border-top: 1px solid var(--t-panel-border);
      padding: 6px 14px 7px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Compact summary row: "Tone — 😊 Casual [+ More]" */
    .pp-compact-row {
      display: flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
    }
    .pp-compact-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--t-you-label);
      white-space: nowrap;
    }
    .pp-compact-sep {
      font-size: 10px;
      color: var(--t-you-label);
      opacity: 0.4;
    }
    .pp-compact-value {
      font-size: 12px; font-weight: 600;
      color: var(--t-text);
      flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pp-compact-more {
      background: var(--t-subtle);
      border: 1.5px solid var(--t-ring);
      border-radius: 100px;
      color: var(--t-ai-label);
      cursor: pointer;
      font-family: inherit; font-size: 10.5px; font-weight: 700;
      padding: 2px 9px;
      transition: all 0.12s;
      white-space: nowrap; flex-shrink: 0;
    }
    .pp-compact-more:hover { background: var(--t-ring); }

    /* Thin divider between Tone and Language */
    .pp-row-divider {
      height: 1px;
      background: var(--t-panel-border);
      margin: 1px 0;
    }

    /* Chip grid — hidden by default, expands on .open */
    .pp-tones {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.22s ease, padding-top 0.22s ease;
      padding-top: 0;
    }
    .pp-tones.open {
      max-height: 400px;
      padding-top: 3px;
    }

    .pp-chip,
    .pp-lang-chip {
      background: var(--t-you-bg);
      border: 1.5px solid var(--t-chip-border);
      border-radius: 100px;
      color: var(--t-you-label);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .pp-chip:hover,
    .pp-lang-chip:hover  { border-color: var(--t-accent-1); color: var(--t-ai-label); }
    .pp-chip.active,
    .pp-lang-chip.active {
      background: linear-gradient(135deg, var(--t-accent-1), var(--t-accent-2));
      border-color: transparent;
      color: var(--t-on-accent);
      font-weight: 600;
      box-shadow: 0 2px 8px var(--t-glow);
    }

    /* ── Action row ── */
    .pp-actions {
      background: var(--t-panel-bg);
      border-top: 1px solid var(--t-panel-border);
      display: flex;
      gap: 8px;
      padding: 8px 14px 10px;
      flex-shrink: 0;
    }

    .pp-btn-run {
      flex: 1;
      background: linear-gradient(135deg, var(--t-accent-1), var(--t-accent-2));
      border: none; border-radius: 11px;
      color: var(--t-on-accent); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: inherit; font-size: 13.5px; font-weight: 700;
      padding: 10px 14px;
      transition: filter 0.12s, transform 0.1s;
      box-shadow: 0 3px 12px var(--t-glow);
    }
    .pp-btn-run:hover:not(:disabled)  { filter: brightness(1.1); transform: translateY(-1px); }
    .pp-btn-run:active { transform: translateY(0); }
    .pp-btn-run:disabled { opacity: 0.6; cursor: not-allowed; }

    /* AI bubble label row — label + copy button side by side */
    .pp-bubble-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
    }

    .pp-bubble-ai .pp-bubble-label { color: var(--t-ai-label); }

    .pp-btn-copy {
      display: none;
      align-items: center;
      gap: 5px;
      background: var(--t-subtle);
      border: 1.5px solid var(--t-ring);
      border-radius: 20px;
      color: var(--t-ai-label);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .pp-btn-copy.visible { display: flex; }
    .pp-btn-copy:hover { background: var(--t-ring); border-color: var(--t-accent-1); }
    /* Clear button (You-wrote bubble) reuses the Copy button's look but is always shown */
    .pp-btn-clear-visible { display: flex; }

    .pp-spin {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="pp-header">
    <div class="pp-brand">
      <span class="pp-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></span>
      <div>
        <div class="pp-brand-name">PenPal AI</div>
        <div class="pp-brand-tag" id="pp-brand-tag">Your words, polished</div>
      </div>
    </div>
    <div class="pp-header-actions">
      <button class="pp-popout-btn" id="pp-popout-btn" title="Open in pop-out window">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
      <button class="pp-settings-btn" id="pp-settings-btn">⚙ Settings</button>
    </div>
  </div>

  <button id="pp-no-key">🔑 No API key set — click to open Settings</button>
  <div id="pp-selection-notice">✦ Page text detected — loaded below</div>

  <div class="pp-chat">
    <!-- YOU bubble -->
    <div class="pp-bubble-wrap pp-bubble-you">
      <div class="pp-bubble-label-row">
        <div class="pp-bubble-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-1px"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg> You wrote</div>
        <button class="pp-btn-copy pp-btn-clear-visible" id="pp-clear-btn" title="Clear input and result">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          Clear
        </button>
      </div>
      <textarea class="pp-textarea" id="pp-input" placeholder="Paste or type text to improve… or highlight text on any page first"></textarea>
    </div>

    <!-- AI bubble (hidden until result) -->
    <div class="pp-bubble-wrap pp-bubble-ai" id="pp-ai-wrap" style="display:none">
      <div class="pp-bubble-label-row">
        <div class="pp-bubble-label">✦ PenPal suggests</div>
        <button class="pp-btn-copy" id="pp-copy-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
      <div class="pp-dots" id="pp-dots">
        <div class="pp-dot"></div>
        <div class="pp-dot"></div>
        <div class="pp-dot"></div>
      </div>
      <div class="pp-result-bubble" id="pp-result" style="display:none"></div>
      <div class="pp-error" id="pp-error" style="display:none"></div>
    </div>
  </div>

  <!-- Tone + Language section -->
  <div class="pp-tone-section">

    <!-- Tone compact summary row -->
    <div class="pp-compact-row" id="pp-tone-row">
      <span class="pp-compact-label">Tone</span>
      <span class="pp-compact-sep">—</span>
      <span class="pp-compact-value" id="pp-tone-value">😊 Casual</span>
      <button class="pp-compact-more" id="pp-tone-more-btn">+ More</button>
    </div>
    <!-- Tone chips (hidden until expanded) -->
    <div class="pp-tones" id="pp-tones-wrap"></div>

    <div class="pp-row-divider" id="pp-lang-divider"></div>

    <!-- Language compact summary row (session-only override) -->
    <div class="pp-compact-row" id="pp-lang-row">
      <span class="pp-compact-label">Language</span>
      <span class="pp-compact-sep">—</span>
      <span class="pp-compact-value" id="pp-lang-value">🇺🇸 English (US)</span>
      <button class="pp-compact-more" id="pp-lang-more-btn">+ More</button>
    </div>
    <!-- Language chips (hidden until expanded; session-only) -->
    <div class="pp-tones" id="pp-langs-wrap"></div>

  </div>

  <!-- Actions -->
  <div class="pp-actions">
    <button class="pp-btn-run" id="pp-run-btn">
      <span id="pp-run-label">✦ Rewrite with PenPal AI</span>
      <div class="pp-spin" id="pp-spin" style="display:none"></div>
    </button>
  </div>

  <script src="penpal-popup.js"></script>
</body>
</html>
