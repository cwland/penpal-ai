    /* ── Menu layout (compact control menu) ── */
    body {
      width: 240px;
      background: var(--t-surface);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: var(--t-text);
      -webkit-font-smoothing: antialiased;
    }

    .pm-header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 14px;
      background: linear-gradient(135deg, var(--t-accent-1) 0%, var(--t-accent-2) 100%);
      color: var(--t-on-accent);
    }
    .pm-logo {
      width: 24px; height: 24px;
      flex-shrink: 0;
      display: block;
      border-radius: 6px;
    }
    .pm-title { font-size: 15px; font-weight: 700; letter-spacing: 0.2px; }
    .pm-version { font-size: 10px; font-weight: 600; opacity: 0.75; letter-spacing: 0; }
    .pm-sub { font-size: 10.5px; opacity: 0.85; margin-top: 1px; }

    .pm-menu { padding: 7px; display: flex; flex-direction: column; gap: 2px; }

    .pm-item {
      display: flex;
      align-items: center;
      gap: 11px;
      width: 100%;
      padding: 10px 11px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--t-text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, transform 0.05s ease;
    }
    .pm-item:hover { background: var(--t-subtle); }
    .pm-item:focus-visible {
      outline: none;
      background: var(--t-subtle);
      box-shadow: 0 0 0 2px var(--t-ring);
    }
    .pm-item:active { transform: translateY(0.5px); }

    .pm-ico {
      width: 26px; height: 26px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: var(--t-subtle);
      color: var(--t-ai-label);
    }
    .pm-ico svg { width: 15px; height: 15px; }
    .pm-label { flex: 1; }

    .pm-note {
      display: none;
      padding: 8px 14px 11px;
      font-size: 11px;
      line-height: 1.4;
      color: var(--t-you-label);
    }
    .pm-note.show { display: block; }
  </style>
</head>
<body data-theme="default">
  <div class="pm-header">
    <img class="pm-logo" src="icons/logo.png" alt="">
    <div>
      <div class="pm-title">PenPal <span class="pm-version" id="pm-version"></span></div>
      <div class="pm-sub">Your words, polished</div>
    </div>
  </div>
